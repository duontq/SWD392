<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Course</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f0f0f0; }
        .container { background-color: #eaeaea; padding: 20px; border: 1px solid #ccc; border-radius: 5px; width: 450px; margin: 0 auto; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; display: flex; align-items: center; }
        .form-group label { width: 100px; }
        .form-group input[type="text"], .form-group input[type="number"] { padding: 5px; border: 1px solid #ccc; }
        .error { color: red; margin-bottom: 15px; }
        button, .btn { padding: 5px 15px; border: 1px solid #999; background-color: #e0e0e0; cursor: pointer; border-radius: 3px; margin-left: 10px;}
        button:hover, .btn:hover { background-color: #d0d0d0; }
        .back-link { margin-top: 15px; display: inline-block; font-size: 14px;}
        .readonly-field { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form action="#" th:action="@{/search}" method="post">
        <div class="form-group">
            <label>Enter code</label>
            <input type="text" name="code" th:value="${searchCode}" style="width: 100px;" required/>
            <button type="submit">Search</button>
        </div>
    </form>
    
    <div th:if="${course != null}">
        <div class="form-group">
            <label>Course name</label>
            <input type="text" th:value="${course.name}" class="readonly-field" style="flex-grow: 1;" readonly/>
        </div>
        
        <div class="form-group">
            <label>Credit</label>
            <input type="number" th:value="${course.credit}" class="readonly-field" style="width: 50px;" readonly/>
        </div>
    </div>
    
    <div th:if="${course == null}">
        <div class="form-group">
            <label>Course name</label>
            <input type="text" class="readonly-field" style="flex-grow: 1;" readonly/>
        </div>
        
        <div class="form-group">
            <label>Credit</label>
            <input type="number" class="readonly-field" style="width: 50px;" readonly/>
        </div>
    </div>

    <a href="/" class="back-link">Back to Menu</a>
</div>

</body>
</html>
