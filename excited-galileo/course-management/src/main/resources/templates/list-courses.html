<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>List of all courses</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f0f0f0; }
        .container { background-color: #eaeaea; padding: 20px; border: 1px solid #ccc; border-radius: 5px; width: 500px; margin: 0 auto; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        h3 { text-align: center; margin-top: 0; }
        .course-list { background-color: white; border: 1px solid #999; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; white-space: pre; }
        .back-link { margin-top: 15px; display: inline-block; font-size: 14px;}
    </style>
</head>
<body>

<div class="container">
    <h3>List of all courses (order by Credit)</h3>
    
    <div class="course-list">
<th:block th:each="course : ${courses}">
<span th:text="${course.code}"></span> | <span th:text="${course.name}"></span> | <span th:text="${course.credit}"></span>
</th:block>
    </div>
    
    <a href="/" class="back-link">Back to Menu</a>
</div>

</body>
</html>
