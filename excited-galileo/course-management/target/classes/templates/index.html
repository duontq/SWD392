<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses Management</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; margin: 0; }
        .container { background-color: #eaeaea; padding: 30px; border: 1px solid #ccc; border-radius: 5px; text-align: center; width: 300px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; }
        .btn { display: block; width: 100%; padding: 10px; margin: 10px 0; background-color: #e0e0e0; border: 1px solid #999; border-radius: 3px; text-decoration: none; color: black; font-weight: normal; cursor: pointer; }
        .btn:hover { background-color: #d0d0d0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Courses Management</h2>
    <a href="/add" class="btn">Add a new Course</a>
    <a href="/list" class="btn">Display all Courses</a>
    <a href="/search" class="btn">Search Course by Course Code</a>
    <a href="#" class="btn" onclick="window.close();">Exit Application</a>
</div>

</body>
</html>
